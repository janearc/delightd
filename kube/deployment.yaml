apiVersion: apps/v1
kind: Deployment
metadata:
  name: delightd
  namespace: fleet
  labels:
    app.kubernetes.io/name: delightd
    app.kubernetes.io/part-of: fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: delightd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: delightd
        app.kubernetes.io/part-of: fleet
    spec:
      # The compose runs the binary as the host engineer's UID/GID so every
      # archive and shim it writes under /var stays host-owned, never root.
      # HOME is unset for a numeric user, so it resolves to "/" — which is why
      # viper finds the config at /etc/delightd and traefik dynamic lands in
      # /var/traefik/dynamic. Keep that contract intact here.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: delightd
          # Locally built image. The compose builds with no explicit name, so
          # docker tags it <project>-<service>:latest = delightd-delightd:latest.
          # That is the exact cached tag the primary agent imports into k3d.
          # See handoff: this is the closest thing to a pinned tag the compose
          # produces; if the primary rebuilds, the digest changes under the same
          # tag — flag for a real version tag before fleet rollout.
          image: delightd-delightd:latest
          imagePullPolicy: IfNotPresent
          # Match the compose entrypoint+args: daemon, immediate first sweep.
          # No --dry-run: this is the live control plane (the stale k8s/ manifest
          # ran --dry-run; that was a safety stub, not the real deployment).
          command: ["/usr/local/bin/delightd"]
          args: ["--immediate"]
          ports:
            - name: control
              containerPort: 8088
          env:
            # The four roots, mapped onto this pod's mounts (see volumeMounts).
            # Mirrors docker-compose.yml.
            #   MONITOR_ROOT /work -- read-only /work mount, the git-state source.
            #   DAEMON_ROOT  /var  -- the /var write mount, delightd's state tree.
            #   BACKUPS_ROOT /var/backups -- backup destination on the /var write
            #     mount; the daemon writes archives here directly (no appended
            #     "/backups"). Set explicitly, not left to the ${DAEMON_ROOT}/backups
            #     default. Resolves to ~/var/backups on the host, same as compose.
            #   CONFIG_ROOT  /etc/delightd -- the read-only config mount.
            - name: DELIGHT_MONITOR_ROOT
              value: "/work"
            - name: DELIGHT_DAEMON_ROOT
              value: "/var"
            - name: DELIGHT_BACKUPS_ROOT
              value: "/var/backups"
            - name: DELIGHT_CONFIG_ROOT
              value: "/etc/delightd"
            # The host's ~/etc/delightd is bind-mounted directly at /etc/delightd
            # here, so the config dir IS the config root -- a non-standard layout
            # vs the on-host ~/etc (where config lives one level down in
            # delightd/). delightd derives the drop-in dir as
            # <ConfigRoot>/delightd/projects.d, which under this mount would
            # double to /etc/delightd/delightd/projects.d and find nothing. Pin
            # the projects.d path explicitly (the override the config code
            # provides for exactly this case) so the fragments are read.
            - name: DELIGHT_PROJECTS_DIR
              value: "/etc/delightd/projects.d"
            - name: DELIGHT_EXPORTS_REGISTRY
              value: "/etc/delightd/delight-registry.yaml"
            - name: DELIGHT_EXPORTS_BIN
              value: "/var/bin"
            - name: DELIGHT_EXPORTS_STATE
              value: "/var/runtime/delightd/exports"
            - name: DELIGHT_EXPORTS_ARCHIVE
              value: "/var/archive/delightd/exports"
          readinessProbe:
            httpGet:
              path: /health
              port: control
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: control
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            # git-state source: read-only (delightd reads project git trees).
            - name: host-work
              mountPath: /work
              readOnly: true
            # config + registry: read-only (delight.yaml sets control_port 8088).
            - name: host-etc-delightd
              mountPath: /etc/delightd
              readOnly: true
            # backups, exports (/var/bin), traefik dynamic (/var/traefik/dynamic):
            # the one write surface.
            - name: host-var
              mountPath: /var
      volumes:
        - name: host-work
          hostPath:
            path: /Users/jane/work
            type: Directory
        - name: host-etc-delightd
          hostPath:
            path: /Users/jane/etc/delightd
            type: Directory
        - name: host-var
          hostPath:
            path: /Users/jane/var
            type: Directory
