syntax = "proto3";

// Package registry.v1 also carries delightd's registry events. This file holds the events
// the broker emits onto the bus; it is intentionally self-contained (only a timestamp
// import, no reference to RegisterRequest/frood) so its schema registers cleanly on its own.
package registry.v1;

import "google/protobuf/timestamp.proto";

// NotRegistered is emitted when a /register does not complete -- the registration was not
// recorded, and this says why. It is a state-and-reason report, not a verdict. The
// never-silent rule: the outcome is not only an HTTP response to the caller, it is also a
// visible event on the bus, so an operator (or an agent watching the stream) can see the
// froods whose registration did not complete, not only the ones that joined. It is flat by
// design: the salient facts, not the whole request payload.
message NotRegistered {
  // project is the project the caller claimed to be.
  string project = 1;
  // endpoint is the endpoint authority it tried to claim (may be empty if none was given).
  string endpoint = 2;
  // code is a stable, machine-readable category for the outcome (e.g. "unknown_project",
  // "inconsistent_identity", "endpoint_held", "unknown_subject", "missing_required_subject",
  // "malformed_serves", "unreachable").
  string code = 3;
  // reason is the human-readable explanation (the same text returned to the caller).
  string reason = 4;
  // occurred_at is when the registration did not complete.
  google.protobuf.Timestamp occurred_at = 5;

  // Reserved for future fields (the claimed identity, contract counts) without renumbering.
  reserved 6 to 15;
}
