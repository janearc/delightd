name: ci

# delightd is a Go daemon. CI regenerates the protobuf bindings (gen/ is
# gitignored, and the buf plugin protoc-gen-go is local, so it is installed
# first), gates on gofmt + vet, then builds and tests with the race detector --
# the same steps a developer runs locally.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc-gen-go (local buf plugin)
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install protoc-gen-rust-serde (cross-repo buf plugin, pinned to big-little-mesh)
        # delightd's resolve.v1 Rust crate (gen/rust) is generated by big-little-mesh's
        # protoc-gen-rust-serde, run unforked. buf treats a missing local: plugin as fatal, so
        # buf generate (next step) needs it on PATH. Pinned to a blm COMMIT, never @latest: the
        # committed crate is the source of truth for the widget, and an unpinned plugin could
        # silently regenerate it into drift. Bump this sha deliberately, with a regen, when blm
        # ships a plugin change delightd should adopt.
        run: |
          go install github.com/janearc/big-little-mesh/cmd/protoc-gen-rust-serde@cf1411c50c746ba3692c3de1279d786aa4e761bf
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate protobuf bindings
        run: buf generate
      - name: Fail on gen/rust drift
        # gen/go is gitignored and regenerated, but gen/rust IS committed (the widget consumes
        # it as a dependency and has no protoc toolchain). Prove the checked-in crate still
        # matches a fresh generate from the contracts + the pinned plugin, so it can never
        # silently diverge. gen/go stays untracked, so this only inspects the committed crate.
        run: git diff --exit-code -- gen/rust
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -cover ./...
      # The functional test proves delightd's headline promise end to end: it builds
      # the real delightd binary, brings the daemon UP against a fully synthetic
      # environment (temp roots + a couple of fake `git init` projects, one clean and
      # one left dirty), and drives the live control port -- GET /health, /projects,
      # /git -- then asserts a POST /projects/{name}/backup turns into a checkpoint
      # .tgz on disk. A handler returning 200 is not enough; only a separate process
      # binding a real socket and running the backup eval loop proves the daemon
      # actually works. It is self-contained (loopback HTTP, its own temp fixtures,
      # no host paths, no network) and gated behind the `integration` build tag so it
      # does not run in the default unit lap.
      - name: Functional (daemon end-to-end)
        run: go test -tags=integration -race -count=1 ./test/integration/...

  rust:
    # The committed gen/rust crate (delightd-contracts) is what the tiny-monitor widget
    # consumes. cargo test runs its generated protojson conformance tests so a serde-mapping
    # regression in resolve.v1 is caught here; the go job's "Fail on gen/rust drift" step
    # separately proves the crate is in sync with the contracts and the pinned plugin.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: cargo test (generated crate conformance)
        working-directory: gen/rust
        run: cargo test
