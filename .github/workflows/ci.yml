name: ci

# delightd is a Go daemon. CI regenerates the protobuf bindings (gen/ is
# gitignored, and the buf plugin protoc-gen-go is local, so it is installed
# first), gates on gofmt + vet, then builds and tests with the race detector --
# the same steps a developer runs locally.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc-gen-go (local buf plugin)
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate protobuf bindings
        run: buf generate
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -cover ./...
      # The functional test proves delightd's headline promise end to end: it builds
      # the real delightd binary, brings the daemon UP against a fully synthetic
      # environment (temp roots + a couple of fake `git init` projects, one clean and
      # one left dirty), and drives the live control port -- GET /health, /projects,
      # /git -- then asserts a POST /projects/{name}/backup turns into a checkpoint
      # .tgz on disk. A handler returning 200 is not enough; only a separate process
      # binding a real socket and running the backup eval loop proves the daemon
      # actually works. It is self-contained (loopback HTTP, its own temp fixtures,
      # no host paths, no network) and gated behind the `integration` build tag so it
      # does not run in the default unit lap.
      - name: Functional (daemon end-to-end)
        run: go test -tags=integration -race -count=1 ./test/integration/...
